services:
  control-plane:
    build:
      context: .
    image: ghcr.io/itsh-neumeier/ubirstp2onvif:latest
    ports:
      - "8080:8080"
    environment:
      APP_ROLE: control-plane
      PORT: 8080
      DATA_DIR: /data
      APP_BASE_URL: http://localhost:8080
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: change-me-now
      ONVIF_DISCOVERY_ENABLED: "false"
    volumes:
      # Worker containers read stream definitions from this same data volume.
      - ubirstp2onvif-control-plane-data:/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  worker-template:
    image: ghcr.io/itsh-neumeier/ubirstp2onvif:latest
    profiles:
      - workers
    # Replace values per camera and duplicate this service for each worker.
    # UniFi-facing workers should use one dedicated LAN IP each.
    environment:
      APP_ROLE: worker
      WORKER_STREAM_ID: replace-with-stream-id
      PORT: 8080
      DATA_DIR: /data
      APP_BASE_URL: http://192.168.10.201:8080
      ONVIF_USERNAME: onvif
      ONVIF_PASSWORD: change-me-now
      ONVIF_DISCOVERY_ENABLED: "true"
      ONVIF_DISCOVERY_PORT: 3702
      GO2RTC_RTSP_PORT: 8554
      GO2RTC_API_PORT: 1984
      GO2RTC_STREAM_NAME: camera
    volumes:
      # Must match control-plane volume while worker config is DB-backed.
      - ubirstp2onvif-control-plane-data:/data
    security_opt:
      - no-new-privileges:true
    # Use an external macvlan/ipvlan network in production.
    networks:
      worker-lan:
        ipv4_address: 192.168.10.201
    restart: unless-stopped

  go2rtc-sidecar:
    image: alexxit/go2rtc:latest
    profiles:
      - workers
    network_mode: service:worker-template
    depends_on:
      - worker-template
    # go2rtc shares the worker network namespace, so it uses the same LAN IP.
    environment:
      GO2RTC_RTSP_PORT: 8554
      GO2RTC_API_PORT: 1984
      GO2RTC_CONFIG: /config/go2rtc.yaml
    volumes:
      - ubirstp2onvif-go2rtc-data:/config
    restart: unless-stopped

volumes:
  ubirstp2onvif-control-plane-data:
  ubirstp2onvif-go2rtc-data:

networks:
  worker-lan:
    external: true
